<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Trading Platform Auth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* 1. Keyframe Animations */

        /* Floating effect for symbols */
        @keyframes float {
            0% {
                transform: translate(0, 0) rotate(0deg);
                opacity: 0.8;
            }

            50% {
                transform: translate(15px, -30px) rotate(8deg);
                opacity: 1;
            }

            100% {
                transform: translate(0, 0) rotate(0deg);
                opacity: 0.8;
            }
        }

        /* Candlestick animation - simulates trading volume/activity */
        @keyframes candle-move {

            0%,
            100% {
                transform: scaleY(1);
                opacity: 0.7;
            }

            50% {
                transform: scaleY(2.5);
                opacity: 1;
            }

            25%,
            75% {
                transform: scaleY(0.5);
                opacity: 0.5;
            }
        }

        /* Background Gradient Animation (Optional) */
        @keyframes gradient-shift {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* 2. Custom Classes */

        /* Apply floating animation */
        .floating-element {
            animation: float 12s ease-in-out infinite alternate;
        }

        /* Define the background style */
        .advanced-bg {
            background: linear-gradient(-45deg, #1f2937, #111827, #0f172a, #030712);
            /* Dark, financial theme gradient */
            background-size: 400% 400%;
            animation: gradient-shift 30s ease infinite;
            /* Slow, mesmerizing shift */
        }

        /* Candlestick Bar Styling */
        .candlestick {
            width: 8px;
            /* Width of the candle body */
            height: 50px;
            /* Base height */
            margin: 0 4px;
            background-color: #10b981;
            /* Default green (bull) */
            transform-origin: bottom;
            /* Scales from the bottom up */
            animation: candle-move 4s ease-in-out infinite alternate;
            box-shadow: 0 0 5px rgba(16, 185, 129, 0.5);
        }

        .candlestick.red {
            background-color: #ef4444;
            /* Red (bear) */
            box-shadow: 0 0 5px rgba(239, 68, 68, 0.5);
        }
    </style>
</head>

<body class="advanced-bg min-h-screen flex items-center justify-center p-4">

    <div class="absolute inset-0 z-0 overflow-hidden">

        <div class="absolute bottom-0 left-0 right-0 h-48 flex items-end justify-center opacity-30 transform -skew-y-2">
            <div class="candlestick" style="height: 40px; animation-delay: 0s;"></div>
            <div class="candlestick red" style="height: 60px; animation-delay: -1s;"></div>
            <div class="candlestick" style="height: 75px; animation-delay: -2s;"></div>
            <div class="candlestick red" style="height: 50px; animation-delay: -3s;"></div>
            <div class="candlestick red" style="height: 90px; animation-delay: -4s;"></div>
            <div class="candlestick" style="height: 35px; animation-delay: -5s;"></div>
            <div class="candlestick" style="height: 80px; animation-delay: -6s;"></div>
            <div class="candlestick red" style="height: 55px; animation-delay: -7s;"></div>
            <div class="candlestick" style="height: 70px; animation-delay: -8s;"></div>
        </div>

        <i class="fa-solid fa-money-bill-trend-up fa-6x absolute top-[10%] left-[5%] text-green-500/30 floating-element"
            style="animation-delay: 0s;"></i>
        <i class="fa-solid fa-arrow-trend-down fa-5x absolute top-[25%] right-[10%] text-red-500/30 floating-element"
            style="animation-delay: 4s;"></i>
        <!-- Bullish -->
        <i class="fa-solid fa-credit-card fa-4x absolute bottom-[15%] left-[10%] text-green-500/50 floating-element"
            style="animation-delay: 8s;"></i>

        <!-- Bearish -->
        <i class="fa-solid fa-line-chart fa-4x absolute bottom-[15%] right-[25%] text-red-500/50 floating-element"
            style="animation-delay: 10s;"></i>
        <i class="fa-solid fa-coins fa-7x absolute bottom-[5%] right-[5%] text-gray-400/30 floating-element"
            style="animation-delay: 12s;"></i>
    </div>

    <div
        class="relative z-10 w-full max-w-lg p-10 bg-white/5 backdrop-blur-xl rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.8)] border border-white/10 transition duration-500 hover:shadow-[0_25px_60px_rgba(16,185,129,0.3)]">

        <h2 id="form-title" class="text-4xl font-extrabold text-white text-center mb-8 tracking-wider">
            <span class="text-green-500">TRADE</span> LOGIN
        </h2>

        <button onclick="handleGoogleLogin()"
            class="w-full flex items-center justify-center bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-xl transition duration-300 mb-6 shadow-xl transform hover:scale-[1.02]">
            <i class="fa-brands fa-google text-2xl mr-3"></i>
            Continue with Google
        </button>

        <div class="flex items-center mb-6">
            <hr class="flex-grow border-gray-700/50">
            <span class="mx-4 text-gray-400 text-sm font-light">OR USE EMAIL</span>
            <hr class="flex-grow border-gray-700/50">
        </div>

        <form id="auth-form">
            <div id="name-field" class="mb-4 hidden">
                <label for="name" class="block text-sm font-medium text-gray-300 mb-1">Full Name</label>
                <input type="text" id="name" name="name" required
                    class="mt-1 block w-full px-5 py-3 bg-white/10 border border-gray-700/50 rounded-xl text-white placeholder-gray-500 focus:ring-green-500 focus:border-green-500 transition duration-300">
            </div>

            <div class="mb-4">
                <label for="email" class="block text-sm font-medium text-gray-300 mb-1">Email Address</label>
                <input type="email" id="email" name="email" required
                    class="mt-1 block w-full px-5 py-3 bg-white/10 border border-gray-700/50 rounded-xl text-white placeholder-gray-500 focus:ring-green-500 focus:border-green-500 transition duration-300">
            </div>

            <div class="mb-8">
                <label for="password" class="block text-sm font-medium text-gray-300 mb-1">Password</label>
                <input type="password" id="password" name="password" required
                    class="mt-1 block w-full px-5 py-3 bg-white/10 border border-gray-700/50 rounded-xl text-white placeholder-gray-500 focus:ring-green-500 focus:border-green-500 transition duration-300">
            </div>

            <button id="submit-button" type="submit"
                class="w-full bg-green-600 hover:bg-green-700 text-white font-extrabold py-3 px-4 rounded-xl transition duration-300 shadow-2xl shadow-green-900/50 transform hover:-translate-y-0.5">
                Sign In to Trading
            </button>
        </form>

        <p class="mt-8 text-center text-sm text-gray-400">
            <span id="toggle-text">Don't have a trading account?</span>
            <button id="toggle-button" onclick="toggleForm()"
                class="text-green-500 hover:text-green-400 font-bold ml-1 transition duration-300">Register Now</button>
        </p>
    </div>

    <script>
    // --- WRAP EVERYTHING IN DOMContentLoaded ---
    document.addEventListener('DOMContentLoaded', function() {
        
        let isLogin = true;
        const formTitle = document.getElementById('form-title');
        const nameField = document.getElementById('name-field');
        const submitButton = document.getElementById('submit-button');
        const toggleText = document.getElementById('toggle-text');
        const toggleButton = document.getElementById('toggle-button');
        const authForm = document.getElementById('auth-form');

        // **IMPORTANT: Define your base URL**
        // Ensure this is your current Render URL:
        const API_BASE_URL = 'https://financetracker-0sg7.onrender.com';

        function toggleForm() {
            isLogin = !isLogin;
            if (isLogin) {
                formTitle.innerHTML = '<span class="text-green-500">TRADE</span> LOGIN';
                nameField.classList.add('hidden');
                submitButton.textContent = 'Sign In to Trading';
                toggleText.textContent = "Don't have a trading account?";
                toggleButton.textContent = 'Register Now';
            } else {
                formTitle.innerHTML = '<span class="text-green-500">JOIN</span> THE MARKET';
                nameField.classList.remove('hidden');
                submitButton.textContent = 'Create Trading Account';
                toggleText.textContent = 'Already on the platform?';
                toggleButton.textContent = 'Sign In';
            }
        }

        // --- Standard Email/Password Submission (Final Logic) ---
        authForm.addEventListener('submit', function (e) {
            e.preventDefault();
            const formData = new FormData(authForm);
            const data = Object.fromEntries(formData.entries());

            // Use the global isLogin state, which is now reliable due to DOMContentLoaded
            const endpoint = isLogin ? `${API_BASE_URL}/api/login` : `${API_BASE_URL}/api/signup`;

            submitButton.textContent = 'Processing...';
            submitButton.disabled = true;

            fetch(endpoint, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data),
            })
                .then(response => {
                    if (!response.ok) {
                        return response.json().then(errorData => {
                            throw new Error(errorData.error || 'Server responded with an error.');
                        });
                    }
                    return response.json();
                })
                .then(result => {
                    console.log("Authentication Successful! Token:", result.token);

                    localStorage.setItem('userToken', result.token);
                    window.location.href = 'dashboard.html';

                })
                .catch(error => {
                    console.error('Authentication Error:', error.message);
                    alert(`Authentication Failed: ${error.message}`);
                })
                .finally(() => {
                    const loginText = 'Sign In to Trading';
                    const signupText = 'Create Trading Account';
                    submitButton.textContent = isLogin ? loginText : signupText;
                    submitButton.disabled = false;
                });
        });
        // --- End Standard Email/Password Submission ---


        // --- Google OAuth Initiation ---
        function handleGoogleLogin() {
            console.log('Initiating Google OAuth flow...');
            window.location.href = `${API_BASE_URL}/api/auth/google`;
        }

        // --- Attach Google Login globally (needed because the button is onclick="handleGoogleLogin()") ---
        window.handleGoogleLogin = handleGoogleLogin; 
    }); 
    // --- END WRAPPER ---
</script>
</body>

</html>
